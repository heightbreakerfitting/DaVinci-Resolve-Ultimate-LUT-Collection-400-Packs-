<svg width="1200" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dvbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="dvfilm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="35%" stop-color="#E8C97A"/>
      <stop offset="70%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#B3A0D4"/>
    </linearGradient>
    <filter id="dvglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="450" fill="url(#dvbg)"/>
  <!-- Film strip left -->
  <g transform="translate(30, 60)" opacity="0.2" fill="none" stroke="#C9A96E" stroke-width="1">
    <rect x="0" y="0" width="80" height="330" rx="3"/>
    <rect x="8" y="12" width="64" height="44" rx="2" fill="#7EC8E380"/>
    <rect x="8" y="64" width="64" height="44" rx="2" fill="#C9A96E60"/>
    <rect x="8" y="116" width="64" height="44" rx="2" fill="#B3A0D460"/>
    <rect x="8" y="168" width="64" height="44" rx="2" fill="#7EC8E380"/>
    <rect x="8" y="220" width="64" height="44" rx="2" fill="#E8C97A60"/>
    <rect x="8" y="272" width="64" height="44" rx="2" fill="#C9A96E60"/>
    <!-- Sprockets -->
    <circle cx="0" cy="20" r="5" fill="#C9A96E"/><circle cx="0" cy="50" r="5" fill="#C9A96E"/>
    <circle cx="0" cy="80" r="5" fill="#C9A96E"/><circle cx="0" cy="110" r="5" fill="#C9A96E"/>
    <circle cx="0" cy="140" r="5" fill="#C9A96E"/><circle cx="0" cy="170" r="5" fill="#C9A96E"/>
    <circle cx="0" cy="200" r="5" fill="#C9A96E"/><circle cx="0" cy="230" r="5" fill="#C9A96E"/>
    <circle cx="0" cy="260" r="5" fill="#C9A96E"/><circle cx="0" cy="290" r="5" fill="#C9A96E"/>
    <circle cx="80" cy="20" r="5" fill="#C9A96E"/><circle cx="80" cy="50" r="5" fill="#C9A96E"/>
    <circle cx="80" cy="80" r="5" fill="#C9A96E"/><circle cx="80" cy="110" r="5" fill="#C9A96E"/>
    <circle cx="80" cy="140" r="5" fill="#C9A96E"/><circle cx="80" cy="170" r="5" fill="#C9A96E"/>
    <circle cx="80" cy="200" r="5" fill="#C9A96E"/><circle cx="80" cy="230" r="5" fill="#C9A96E"/>
    <circle cx="80" cy="260" r="5" fill="#C9A96E"/><circle cx="80" cy="290" r="5" fill="#C9A96E"/>
  </g>
  <!-- Color wheel decoration right -->
  <g transform="translate(1050, 180)" opacity="0.18">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#C9A96E" stroke-width="1"/>
    <path d="M0,0 L0,-110 A110,110 0 0,1 95,-55 Z" fill="#E8C97A"/>
    <path d="M0,0 L95,-55 A110,110 0 0,1 95,55 Z" fill="#7EC8E3"/>
    <path d="M0,0 L95,55 A110,110 0 0,1 0,110 Z" fill="#B3A0D4"/>
    <path d="M0,0 L0,110 A110,110 0 0,1 -95,55 Z" fill="#C9A96E"/>
    <path d="M0,0 L-95,55 A110,110 0 0,1 -95,-55 Z" fill="#E8C97A"/>
    <path d="M0,0 L-95,-55 A110,110 0 0,1 0,-110 Z" fill="#7EC8E3"/>
    <circle cx="0" cy="0" r="40" fill="#030508"/>
  </g>
  <!-- Top badge -->
  <rect x="390" y="38" width="420" height="28" rx="4" fill="#C9A96E15" stroke="#C9A96E" stroke-width="0.8"/>
  <text x="600" y="57" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#E8C97A" letter-spacing="3">DAVINCI RESOLVE · PREMIERE PRO · FINAL CUT PRO</text>
  <!-- Main title -->
  <text x="590" y="158" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="url(#dvfilm)" filter="url(#dvglow)" letter-spacing="1">Cinematic LUT Pack</text>
  <text x="590" y="202" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#C9A96E" letter-spacing="5" opacity="0.8">400+ PROFESSIONAL GRADES</text>
  <!-- Divider -->
  <line x1="200" y1="224" x2="980" y2="224" stroke="url(#dvfilm)" stroke-width="0.7" opacity="0.4"/>
  <!-- LUT category chips -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">
    <rect x="115" y="244" width="138" height="30" rx="15" fill="#C9A96E12" stroke="#C9A96E" stroke-width="0.7"/>
    <text x="184" y="264" text-anchor="middle" fill="#E8C97A">🎬 Film Emulation</text>
    <rect x="267" y="244" width="138" height="30" rx="15" fill="#7EC8E312" stroke="#7EC8E3" stroke-width="0.7"/>
    <text x="336" y="264" text-anchor="middle" fill="#7EC8E3">🔵 Teal &amp; Orange</text>
    <rect x="419" y="244" width="138" height="30" rx="15" fill="#B3A0D412" stroke="#B3A0D4" stroke-width="0.7"/>
    <text x="488" y="264" text-anchor="middle" fill="#B3A0D4">✈️ Drone / Aerial</text>
    <rect x="571" y="244" width="138" height="30" rx="15" fill="#C9A96E12" stroke="#C9A96E" stroke-width="0.7"/>
    <text x="640" y="264" text-anchor="middle" fill="#E8C97A">🌅 Golden Hour</text>
    <rect x="723" y="244" width="138" height="30" rx="15" fill="#7EC8E312" stroke="#7EC8E3" stroke-width="0.7"/>
    <text x="792" y="264" text-anchor="middle" fill="#7EC8E3">🎞 Vintage / Retro</text>
    <rect x="875" y="244" width="138" height="30" rx="15" fill="#B3A0D412" stroke="#B3A0D4" stroke-width="0.7"/>
    <text x="944" y="264" text-anchor="middle" fill="#B3A0D4">🌒 Dark / Moody</text>
  </g>
  <!-- Second row chips -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">
    <rect x="200" y="288" width="138" height="30" rx="15" fill="#C9A96E12" stroke="#C9A96E" stroke-width="0.7"/>
    <text x="269" y="308" text-anchor="middle" fill="#E8C97A">👤 Portrait / Skin</text>
    <rect x="352" y="288" width="138" height="30" rx="15" fill="#7EC8E312" stroke="#7EC8E3" stroke-width="0.7"/>
    <text x="421" y="308" text-anchor="middle" fill="#7EC8E3">🌿 Nature / Forest</text>
    <rect x="504" y="288" width="138" height="30" rx="15" fill="#B3A0D412" stroke="#B3A0D4" stroke-width="0.7"/>
    <text x="573" y="308" text-anchor="middle" fill="#B3A0D4">🌆 Urban / City</text>
    <rect x="656" y="288" width="138" height="30" rx="15" fill="#C9A96E12" stroke="#C9A96E" stroke-width="0.7"/>
    <text x="725" y="308" text-anchor="middle" fill="#E8C97A">😱 Horror / Dark</text>
    <rect x="808" y="288" width="138" height="30" rx="15" fill="#7EC8E312" stroke="#7EC8E3" stroke-width="0.7"/>
    <text x="877" y="308" text-anchor="middle" fill="#7EC8E3">☀️ Summer Vivid</text>
  </g>
  <!-- Stats -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="300" y="375" font-size="32" font-weight="700" fill="#E8C97A" filter="url(#dvglow)">400+</text>
    <text x="300" y="395" font-size="11" fill="#665533">LUT files (.cube)</text>
    <text x="550" y="375" font-size="32" font-weight="700" fill="#7EC8E3" filter="url(#dvglow)">15</text>
    <text x="550" y="395" font-size="11" fill="#334455">Categories</text>
    <text x="800" y="375" font-size="32" font-weight="700" fill="#B3A0D4" filter="url(#dvglow)">Free</text>
    <text x="800" y="395" font-size="11" fill="#443355">All included</text>
  </g>
</svg>